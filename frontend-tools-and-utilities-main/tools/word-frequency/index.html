<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Word Frequency Analyzer</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif}
    body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f4f6f8;padding:20px}
    .card{background:#fff;width:100%;max-width:520px;padding:28px;border-radius:16px;box-shadow:0 12px 28px rgba(0,0,0,0.08)}
    h1{text-align:center;margin-bottom:20px;color:#333;font-size:1.5rem}
    textarea{width:100%;height:120px;padding:12px;border:1px solid #ddd;border-radius:10px;font-size:1rem;resize:vertical;margin-bottom:12px}
    .controls{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap}
    button{flex:1;padding:10px;background:#4c8bf5;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:0.95rem}
    button:hover{background:#3a73d9}
    label{display:flex;align-items:center;gap:6px;font-size:0.9rem;color:#555}
    .table-wrap{max-height:240px;overflow-y:auto;border:1px solid #eee;border-radius:10px}
    table{width:100%;border-collapse:collapse}
    th{position:sticky;top:0;background:#f8fafc;padding:10px 14px;font-size:0.85rem;color:#555;text-align:left;border-bottom:1px solid #eee}
    td{padding:8px 14px;border-bottom:1px solid #f1f3f5;font-size:0.9rem}
    .bar{height:8px;background:#4c8bf5;border-radius:4px}
    tr:last-child td{border:none}
  </style>
</head>
<body>
<div class="card">
  <h1>Word Frequency Analyzer</h1>
  <textarea id="txt" placeholder="Paste your text here..."></textarea>
  <div class="controls">
    <label><input type="checkbox" id="stopwords" checked/> Exclude stopwords</label>
    <label><input type="checkbox" id="caseins" checked/> Case insensitive</label>
    <button onclick="analyze()">Analyze</button>
  </div>
  <div class="table-wrap" id="out" style="display:none">
    <table><thead><tr><th>Word</th><th>Count</th><th>Frequency</th></tr></thead><tbody id="tbody"></tbody></table>
  </div>
</div>
<script>
  const stop=new Set(['the','a','an','and','or','but','is','in','it','of','to','as','at','by','for','on','that','this','was','are','with','he','she','they','we','you','i','be','been','has','have','had','do','does','did','not','from','up','about','into','then','so','what','which','who','will','would','can','could','my','your','his','her','its','our','their','there','here','when','if','all','out','one','no','just','more','also','how','get','said','like','than','some','over','only','after','before','me','him','us','them','were','go','see','time','way','new','know','take','even','back','because','come','any','most','between','these','those']);
  function analyze(){
    let text=document.getElementById('txt').value;
    if(!text.trim())return;
    if(document.getElementById('caseins').checked)text=text.toLowerCase();
    const words=text.match(/\b[a-zA-Z']+\b/g)||[];
    const freq={};
    words.forEach(w=>{
      if(document.getElementById('stopwords').checked&&stop.has(w.toLowerCase()))return;
      freq[w]=(freq[w]||0)+1;
    });
    const sorted=Object.entries(freq).sort((a,b)=>b[1]-a[1]).slice(0,40);
    const max=sorted[0]?.[1]||1;
    document.getElementById('tbody').innerHTML=sorted.map(([w,c])=>`<tr><td>${w}</td><td>${c}</td><td><div class="bar" style="width:${Math.round(c/max*100)}%"></div></td></tr>`).join('');
    document.getElementById('out').style.display='block';
  }
</script>
</body>
</html>
