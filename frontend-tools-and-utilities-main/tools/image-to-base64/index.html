<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Image to Base64</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif}
    body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f4f6f8;padding:20px}
    .card{background:#fff;width:100%;max-width:520px;padding:28px;border-radius:16px;box-shadow:0 12px 28px rgba(0,0,0,0.08)}
    h1{text-align:center;margin-bottom:20px;color:#333;font-size:1.5rem}
    .drop{border:2px dashed #4c8bf5;border-radius:12px;padding:30px;text-align:center;cursor:pointer;margin-bottom:16px;color:#666;transition:background 0.2s}
    .drop:hover,.drop.over{background:#f0f5ff}
    input[type=file]{display:none}
    .preview{width:100%;max-height:200px;object-fit:contain;border-radius:10px;display:none;margin-bottom:12px}
    .info{font-size:0.85rem;color:#999;margin-bottom:10px;display:none}
    textarea{width:100%;height:100px;padding:10px;border:1px solid #ddd;border-radius:10px;font-family:monospace;font-size:0.8rem;resize:vertical;display:none;margin-bottom:8px}
    button{width:100%;padding:11px;background:#4c8bf5;color:#fff;border:none;border-radius:10px;font-size:1rem;cursor:pointer;display:none}
    button:hover{background:#3a73d9}
  </style>
</head>
<body>
<div class="card">
  <h1>Image to Base64</h1>
  <div class="drop" id="drop" onclick="document.getElementById('file').click()">
    <div>📁 Click or drag & drop an image</div>
    <div style="font-size:0.8rem;margin-top:6px">PNG, JPG, GIF, WebP, SVG</div>
    <input type="file" id="file" accept="image/*" onchange="handleFile(this.files[0])"/>
  </div>
  <img id="preview" class="preview"/>
  <div class="info" id="info"></div>
  <textarea id="output"></textarea>
  <button id="copyBtn" onclick="navigator.clipboard.writeText(document.getElementById('output').value)">Copy Base64</button>
</div>
<script>
  const drop=document.getElementById('drop');
  drop.addEventListener('dragover',e=>{e.preventDefault();drop.classList.add('over');});
  drop.addEventListener('dragleave',()=>drop.classList.remove('over'));
  drop.addEventListener('drop',e=>{e.preventDefault();drop.classList.remove('over');handleFile(e.dataTransfer.files[0]);});
  function handleFile(f){
    if(!f||!f.type.startsWith('image/'))return;
    const r=new FileReader();
    r.onload=e=>{
      const b64=e.target.result;
      document.getElementById('preview').src=b64;document.getElementById('preview').style.display='block';
      document.getElementById('info').style.display='block';document.getElementById('info').textContent=`${f.name} · ${(f.size/1024).toFixed(1)} KB · ${f.type}`;
      document.getElementById('output').value=b64;document.getElementById('output').style.display='block';
      document.getElementById('copyBtn').style.display='block';
    };r.readAsDataURL(f);
  }
</script>
</body>
</html>
