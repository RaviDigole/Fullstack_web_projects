<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Hash Generator</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif}
    body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f4f6f8;padding:20px}
    .card{background:#fff;width:100%;max-width:520px;padding:28px;border-radius:16px;box-shadow:0 12px 28px rgba(0,0,0,0.08)}
    h1{text-align:center;margin-bottom:20px;color:#333;font-size:1.5rem}
    textarea{width:100%;height:100px;padding:12px;border:1px solid #ddd;border-radius:10px;font-size:1rem;resize:vertical;margin-bottom:14px}
    button{width:100%;padding:11px;background:#4c8bf5;color:#fff;border:none;border-radius:10px;font-size:1rem;cursor:pointer;margin-bottom:16px}
    button:hover{background:#3a73d9}
    .hash-row{margin-bottom:10px}
    label{display:block;font-size:0.85rem;color:#555;margin-bottom:4px}
    .hash-val{display:flex;gap:8px}
    input{flex:1;padding:9px;border:1px solid #ddd;border-radius:8px;font-family:monospace;font-size:0.85rem;background:#f9f9f9}
    .cp{padding:9px 14px;background:#e8f0ff;color:#2a4dbf;border:none;border-radius:8px;cursor:pointer;font-size:0.85rem}
    .cp:hover{background:#d8e6ff}
  </style>
</head>
<body>
<div class="card">
  <h1>Hash Generator</h1>
  <textarea id="txt" placeholder="Enter text to hash..."></textarea>
  <button onclick="genHashes()">Generate Hashes</button>
  <div class="hash-row"><label>SHA-1</label><div class="hash-val"><input id="sha1" readonly/><button class="cp" onclick="copy('sha1')">Copy</button></div></div>
  <div class="hash-row"><label>SHA-256</label><div class="hash-val"><input id="sha256" readonly/><button class="cp" onclick="copy('sha256')">Copy</button></div></div>
  <div class="hash-row"><label>SHA-512</label><div class="hash-val"><input id="sha512" readonly/><button class="cp" onclick="copy('sha512')">Copy</button></div></div>
</div>
<script>
  async function digest(algo,txt){const b=new TextEncoder().encode(txt);const h=await crypto.subtle.digest(algo,b);return Array.from(new Uint8Array(h)).map(x=>x.toString(16).padStart(2,'0')).join('');}
  async function genHashes(){
    const t=document.getElementById('txt').value;
    document.getElementById('sha1').value=await digest('SHA-1',t);
    document.getElementById('sha256').value=await digest('SHA-256',t);
    document.getElementById('sha512').value=await digest('SHA-512',t);
  }
  function copy(id){navigator.clipboard.writeText(document.getElementById(id).value);}
</script>
</body>
</html>
