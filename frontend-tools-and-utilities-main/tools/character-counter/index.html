<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Character Counter</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif}
    body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f4f6f8;padding:20px}
    .card{background:#fff;width:100%;max-width:500px;padding:28px;border-radius:16px;box-shadow:0 12px 28px rgba(0,0,0,0.08)}
    h1{text-align:center;margin-bottom:16px;color:#333;font-size:1.5rem}
    .limit-row{display:flex;gap:10px;align-items:center;margin-bottom:10px}
    label{font-size:0.9rem;color:#555}
    input[type=number]{width:100px;padding:8px;border:1px solid #ddd;border-radius:8px;font-size:0.95rem}
    textarea{width:100%;height:160px;padding:12px;border:2px solid #ddd;border-radius:10px;font-size:1rem;resize:vertical;margin-bottom:12px;transition:border-color 0.2s}
    textarea.warn{border-color:#f59e0b}
    textarea.over{border-color:#e74c3c}
    .bar-wrap{background:#f1f3f5;border-radius:6px;height:8px;margin-bottom:14px}
    .bar{height:8px;border-radius:6px;background:#4c8bf5;width:0%;transition:width 0.2s,background 0.2s}
    .stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
    .stat{background:#f1f3f5;border-radius:10px;padding:12px;text-align:center}
    .val{font-size:1.4rem;font-weight:700;color:#4c8bf5}
    .lbl{font-size:0.78rem;color:#666;margin-top:2px}
    button{width:100%;margin-top:12px;padding:10px;background:#f1f3f5;color:#555;border:none;border-radius:10px;cursor:pointer}
    button:hover{background:#e2e8f0}
  </style>
</head>
<body>
<div class="card">
  <h1>Character Counter</h1>
  <div class="limit-row"><label>Limit:</label><input type="number" id="limit" value="280" min="0"/><label>chars (0 = no limit)</label></div>
  <textarea id="txt" placeholder="Start typing..."></textarea>
  <div class="bar-wrap"><div class="bar" id="bar"></div></div>
  <div class="stats">
    <div class="stat"><div class="val" id="chars">0</div><div class="lbl">Characters</div></div>
    <div class="stat"><div class="val" id="words">0</div><div class="lbl">Words</div></div>
    <div class="stat"><div class="val" id="remain">—</div><div class="lbl">Remaining</div></div>
  </div>
  <button onclick="document.getElementById('txt').value='';update()">Clear</button>
</div>
<script>
  const txt=document.getElementById('txt');
  function update(){
    const v=txt.value,lim=+document.getElementById('limit').value;
    const c=v.length,w=v.trim()===''?0:v.trim().split(/\s+/).length;
    document.getElementById('chars').textContent=c;
    document.getElementById('words').textContent=w;
    if(lim>0){const rem=lim-c;document.getElementById('remain').textContent=rem;const pct=Math.min(100,c/lim*100);const bar=document.getElementById('bar');bar.style.width=pct+'%';bar.style.background=pct>=100?'#e74c3c':pct>=80?'#f59e0b':'#4c8bf5';txt.className=pct>=100?'over':pct>=80?'warn':'';}else{document.getElementById('remain').textContent='—';document.getElementById('bar').style.width='0%';txt.className='';}
  }
  txt.addEventListener('input',update);
</script>
</body>
</html>
