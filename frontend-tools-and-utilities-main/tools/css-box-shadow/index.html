<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>CSS Box Shadow Generator</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif}
    body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f4f6f8;padding:20px}
    .card{background:#fff;width:100%;max-width:540px;padding:28px;border-radius:16px;box-shadow:0 12px 28px rgba(0,0,0,0.08)}
    h1{text-align:center;margin-bottom:20px;color:#333;font-size:1.5rem}
    .preview{width:100%;height:140px;display:flex;align-items:center;justify-content:center;margin-bottom:20px;background:#f8fafc;border-radius:12px}
    .box{width:100px;height:100px;background:#4c8bf5;border-radius:8px;transition:box-shadow 0.2s}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
    .field label{display:block;font-size:0.85rem;color:#555;margin-bottom:4px}
    .field input{width:100%;padding:8px;border:1px solid #ddd;border-radius:8px;font-size:0.95rem}
    .row{display:flex;gap:10px;margin-bottom:12px;align-items:center}
    .row label{font-size:0.85rem;color:#555;min-width:80px}
    .output{background:#f1f3f5;border-radius:10px;padding:12px;font-family:monospace;font-size:0.9rem;margin-bottom:12px;word-break:break-all}
    button{width:100%;padding:11px;background:#4c8bf5;color:#fff;border:none;border-radius:10px;font-size:1rem;cursor:pointer}
    button:hover{background:#3a73d9}
  </style>
</head>
<body>
<div class="card">
  <h1>CSS Box Shadow Generator</h1>
  <div class="preview"><div class="box" id="box"></div></div>
  <div class="grid">
    <div class="field"><label>Horizontal (px)</label><input type="range" id="hoff" min="-50" max="50" value="5" oninput="update()"/></div>
    <div class="field"><label>Vertical (px)</label><input type="range" id="voff" min="-50" max="50" value="5" oninput="update()"/></div>
    <div class="field"><label>Blur (px)</label><input type="range" id="blur" min="0" max="80" value="15" oninput="update()"/></div>
    <div class="field"><label>Spread (px)</label><input type="range" id="spread" min="-20" max="40" value="0" oninput="update()"/></div>
  </div>
  <div class="row"><label>Color</label><input type="color" id="color" value="#000000" oninput="update()"/></div>
  <div class="row"><label>Opacity</label><input type="range" id="opacity" min="0" max="100" value="30" oninput="update()"/><span id="opval">30%</span></div>
  <div class="row"><label>Inset</label><input type="checkbox" id="inset" onchange="update()"/></div>
  <div class="output" id="output"></div>
  <button onclick="navigator.clipboard.writeText(document.getElementById('output').textContent)">Copy CSS</button>
</div>
<script>
  function hexToRgb(h){return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];}
  function update(){
    const h=document.getElementById('hoff').value,v=document.getElementById('voff').value,b=document.getElementById('blur').value,s=document.getElementById('spread').value;
    const op=document.getElementById('opacity').value;document.getElementById('opval').textContent=op+'%';
    const [r,g,rb]=hexToRgb(document.getElementById('color').value);
    const inset=document.getElementById('inset').checked?'inset ':'';
    const css=`${inset}${h}px ${v}px ${b}px ${s}px rgba(${r},${g},${rb},${(op/100).toFixed(2)})`;
    document.getElementById('box').style.boxShadow=css;
    document.getElementById('output').textContent=`box-shadow: ${css};`;
  }
  update();
</script>
</body>
</html>
