<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Loan Calculator</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif}
    body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f4f6f8;padding:20px}
    .card{background:#fff;width:100%;max-width:440px;padding:28px;border-radius:16px;box-shadow:0 12px 28px rgba(0,0,0,0.08)}
    h1{text-align:center;margin-bottom:20px;color:#333;font-size:1.5rem}
    .field{margin-bottom:14px}label{display:block;margin-bottom:5px;font-size:0.9rem;color:#555}
    input{width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:10px;font-size:1rem}
    button{width:100%;padding:11px;background:#4c8bf5;color:#fff;border:none;border-radius:10px;font-size:1rem;cursor:pointer;margin-bottom:16px}
    button:hover{background:#3a73d9}
    .results{display:none;background:#f1f3f5;border-radius:10px;padding:16px}
    .res-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #e5e7eb;font-size:0.95rem}
    .res-row:last-child{border:none}
    .lbl{color:#666}.val{font-weight:700;color:#333}
  </style>
</head>
<body>
<div class="card">
  <h1>Loan Calculator</h1>
  <div class="field"><label>Loan Amount (₹)</label><input type="number" id="principal" value="500000" min="0"/></div>
  <div class="field"><label>Annual Interest Rate (%)</label><input type="number" id="rate" value="8.5" step="0.1" min="0"/></div>
  <div class="field"><label>Loan Term (months)</label><input type="number" id="months" value="60" min="1"/></div>
  <button onclick="calculate()">Calculate</button>
  <div class="results" id="results">
    <div class="res-row"><span class="lbl">Monthly EMI</span><span class="val" id="emi"></span></div>
    <div class="res-row"><span class="lbl">Total Payment</span><span class="val" id="total"></span></div>
    <div class="res-row"><span class="lbl">Total Interest</span><span class="val" id="interest"></span></div>
    <div class="res-row"><span class="lbl">Principal Amount</span><span class="val" id="princ"></span></div>
  </div>
</div>
<script>
  function fmt(n){return n.toLocaleString('en-IN',{minimumFractionDigits:2,maximumFractionDigits:2});}
  function calculate(){
    const P=+document.getElementById('principal').value,r=+document.getElementById('rate').value/100/12,n=+document.getElementById('months').value;
    const emi=r===0?P/n:P*r*Math.pow(1+r,n)/(Math.pow(1+r,n)-1);
    const total=emi*n,interest=total-P;
    document.getElementById('emi').textContent='₹'+fmt(emi);
    document.getElementById('total').textContent='₹'+fmt(total);
    document.getElementById('interest').textContent='₹'+fmt(interest);
    document.getElementById('princ').textContent='₹'+fmt(P);
    document.getElementById('results').style.display='block';
  }
</script>
</body>
</html>
