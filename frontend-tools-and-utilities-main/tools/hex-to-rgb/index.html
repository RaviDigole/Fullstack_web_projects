<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>HEX ↔ RGB Converter</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif}
    body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f4f6f8;padding:20px}
    .card{background:#fff;width:100%;max-width:420px;padding:28px;border-radius:16px;box-shadow:0 12px 28px rgba(0,0,0,0.08)}
    h1{text-align:center;margin-bottom:20px;color:#333;font-size:1.5rem}
    .preview{width:100%;height:80px;border-radius:10px;margin-bottom:16px;background:#4c8bf5;transition:background 0.3s}
    .field{margin-bottom:12px}
    label{display:block;margin-bottom:5px;font-size:0.9rem;color:#555}
    input{width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:10px;font-size:1rem}
    .row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
    button{width:100%;padding:11px;background:#4c8bf5;color:#fff;border:none;border-radius:10px;font-size:1rem;cursor:pointer;margin-top:6px}
    button:hover{background:#3a73d9}
    .result{margin-top:12px;padding:12px;background:#f1f3f5;border-radius:10px;font-size:1rem;font-weight:600;color:#333;display:none;word-break:break-all}
  </style>
</head>
<body>
<div class="card">
  <h1>HEX ↔ RGB Converter</h1>
  <div class="preview" id="preview"></div>
  <div class="field"><label>HEX Color</label><input id="hex" placeholder="#4c8bf5" value="#4c8bf5"/></div>
  <button onclick="hexToRgb()">HEX → RGB</button>
  <hr style="margin:16px 0;border:none;border-top:1px solid #eee"/>
  <div class="row">
    <div class="field"><label>R (0-255)</label><input id="r" type="number" min="0" max="255" value="76"/></div>
    <div class="field"><label>G (0-255)</label><input id="g" type="number" min="0" max="255" value="139"/></div>
    <div class="field"><label>B (0-255)</label><input id="b" type="number" min="0" max="255" value="245"/></div>
  </div>
  <button onclick="rgbToHex()">RGB → HEX</button>
  <div class="result" id="result"></div>
</div>
<script>
  function hexToRgb(){
    let h=document.getElementById('hex').value.replace('#','');
    if(h.length===3)h=h.split('').map(x=>x+x).join('');
    if(!/^[0-9a-fA-F]{6}$/.test(h)){alert('Invalid HEX');return;}
    const r=parseInt(h.slice(0,2),16),g=parseInt(h.slice(2,4),16),b=parseInt(h.slice(4,6),16);
    const res=document.getElementById('result');
    res.style.display='block';res.textContent=`rgb(${r}, ${g}, ${b})`;
    document.getElementById('preview').style.background=`#${h}`;
  }
  function rgbToHex(){
    const r=+document.getElementById('r').value,g=+document.getElementById('g').value,b=+document.getElementById('b').value;
    const hex='#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('');
    const res=document.getElementById('result');
    res.style.display='block';res.textContent=hex;
    document.getElementById('preview').style.background=hex;
  }
  hexToRgb();
</script>
</body>
</html>
