<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Currency Converter</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif}
    body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f4f6f8;padding:20px}
    .card{background:#fff;width:100%;max-width:420px;padding:28px;border-radius:16px;box-shadow:0 12px 28px rgba(0,0,0,0.08)}
    h1{text-align:center;margin-bottom:20px;color:#333;font-size:1.5rem}
    .field{margin-bottom:14px}
    label{display:block;margin-bottom:6px;font-size:0.9rem;color:#555}
    input,select{width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:10px;font-size:1rem}
    button{width:100%;padding:11px;background:#4c8bf5;color:#fff;border:none;border-radius:10px;font-size:1rem;cursor:pointer;margin-top:4px}
    button:hover{background:#3a73d9}
    .result{margin-top:16px;padding:14px;background:#f1f3f5;border-radius:10px;text-align:center;font-size:1.3rem;font-weight:700;color:#333;display:none}
    .note{margin-top:10px;font-size:0.75rem;color:#999;text-align:center}
  </style>
</head>
<body>
<div class="card">
  <h1>Currency Converter</h1>
  <div class="field"><label>Amount</label><input type="number" id="amount" value="1" min="0"/></div>
  <div class="field"><label>From</label>
    <select id="from"></select></div>
  <div class="field"><label>To</label>
    <select id="to"></select></div>
  <button onclick="convert()">Convert</button>
  <div class="result" id="result"></div>
  <p class="note">Rates are approximate (static). For live rates, connect to an API.</p>
</div>
<script>
  const rates={USD:1,EUR:0.92,GBP:0.79,INR:83.5,JPY:155.5,CAD:1.36,AUD:1.53,CHF:0.90,CNY:7.24,SGD:1.34,AED:3.67,MXN:17.2,BRL:4.97,KRW:1340,HKD:7.82,NOK:10.6,SEK:10.4,DKK:6.88,NZD:1.63,ZAR:18.6};
  const from=document.getElementById('from'),to=document.getElementById('to');
  Object.keys(rates).forEach(c=>{
    from.innerHTML+=`<option value="${c}">${c}</option>`;
    to.innerHTML+=`<option value="${c}">${c}</option>`;
  });
  to.value='INR';
  function convert(){
    const amt=parseFloat(document.getElementById('amount').value)||0;
    const r=(amt/rates[from.value])*rates[to.value];
    const res=document.getElementById('result');
    res.style.display='block';
    res.textContent=`${amt} ${from.value} = ${r.toFixed(4)} ${to.value}`;
  }
</script>
</body>
</html>
