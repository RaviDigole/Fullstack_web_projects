<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Text Summarizer</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#f1f5f9;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
width:600px;
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

h1{
text-align:center;
margin-bottom:20px;
color:#111827;
}

textarea{
width:100%;
height:160px;
padding:12px;
border-radius:8px;
border:1px solid #d1d5db;
resize:none;
font-size:14px;
}

button{
margin-top:15px;
width:100%;
padding:12px;
border:none;
background:#2563eb;
color:white;
font-size:16px;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

.output{
margin-top:20px;
background:#f3f4f6;
padding:15px;
border-radius:8px;
min-height:80px;
font-size:14px;
color:#111827;
}

@media(max-width:650px){

.container{
width:90%;
}

}

</style>
</head>

<body>

<div class="container">

<h1>✂️ AI Text Summarizer</h1>

<textarea id="inputText" placeholder="Paste your text here..."></textarea>

<button onclick="summarizeText()">Summarize</button>

<div id="summaryOutput" class="output">
Summary will appear here...
</div>

</div>

<script>

function summarizeText(){

const text = document.getElementById("inputText").value.trim()

if(text === ""){
document.getElementById("summaryOutput").innerText = "Please enter text to summarize."
return
}

const sentences = text.split(". ")

let summary = ""

if(sentences.length >= 2){
summary = sentences[0] + ". " + sentences[1] + "."
}
else{
summary = sentences[0]
}

document.getElementById("summaryOutput").innerText = summary

}

</script>

</body>
</html>
