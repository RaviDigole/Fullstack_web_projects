<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Study Planner</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#f1f5f9;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
width:700px;
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

h1{
text-align:center;
margin-bottom:20px;
color:#111827;
}

input, textarea{
width:100%;
padding:12px;
border-radius:8px;
border:1px solid #d1d5db;
margin-bottom:15px;
font-size:14px;
}

button{
width:100%;
padding:12px;
background:#2563eb;
border:none;
color:white;
font-size:16px;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

.output{
margin-top:20px;
background:#f3f4f6;
padding:20px;
border-radius:8px;
}

.day{
margin-bottom:10px;
padding:10px;
background:white;
border-radius:6px;
border-left:4px solid #2563eb;
}

@media(max-width:750px){
.container{
width:90%;
}
}

</style>
</head>

<body>

<div class="container">

<h1>📚 AI Study Planner</h1>

<input id="subjectsInput" type="text" placeholder="Enter subjects (comma separated)">

<input id="hoursInput" type="number" placeholder="Hours available per day">

<button onclick="generatePlan()">Generate Study Plan</button>

<div id="studyPlan" class="output"></div>

</div>

<script>

function generatePlan(){

const subjectsText = document.getElementById("subjectsInput").value
const hours = document.getElementById("hoursInput").value
const planContainer = document.getElementById("studyPlan")

planContainer.innerHTML = ""

if(subjectsText === "" || hours === ""){
planContainer.innerHTML = "Please enter subjects and hours."
return
}

const subjects = subjectsText.split(",").map(s => s.trim())

const days = [
"Monday","Tuesday","Wednesday",
"Thursday","Friday","Saturday","Sunday"
]

let subjectIndex = 0

days.forEach(day => {

const subject = subjects[subjectIndex]

const div = document.createElement("div")
div.className = "day"

div.innerHTML = `<strong>${day}</strong><br>
Study: ${subject}<br>
Duration: ${hours} hour(s)`

planContainer.appendChild(div)

subjectIndex++

if(subjectIndex >= subjects.length){
subjectIndex = 0
}

})

}

</script>

</body>
</html>
