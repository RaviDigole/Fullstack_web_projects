<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Calorie Calculator</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif}
    body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f4f6f8;padding:20px}
    .card{background:#fff;width:100%;max-width:440px;padding:28px;border-radius:16px;box-shadow:0 12px 28px rgba(0,0,0,0.08)}
    h1{text-align:center;margin-bottom:6px;color:#333;font-size:1.5rem}
    p{text-align:center;color:#999;font-size:0.85rem;margin-bottom:18px}
    .field{margin-bottom:12px}label{display:block;margin-bottom:4px;font-size:0.9rem;color:#555}
    input,select{width:100%;padding:10px;border:1px solid #ddd;border-radius:8px;font-size:1rem}
    .row{display:flex;gap:10px}
    .row .field{flex:1}
    button{width:100%;padding:11px;background:#4c8bf5;color:#fff;border:none;border-radius:10px;font-size:1rem;cursor:pointer;margin-bottom:14px}
    button:hover{background:#3a73d9}
    .results{display:none;background:#f1f3f5;border-radius:10px;padding:14px}
    .res-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #e5e7eb;font-size:0.9rem}
    .res-row:last-child{border:none}
    .lbl{color:#555}.val{font-weight:700;color:#4c8bf5}
  </style>
</head>
<body>
<div class="card">
  <h1>Calorie Calculator</h1>
  <p>Based on Mifflin-St Jeor equation</p>
  <div class="row">
    <div class="field"><label>Age</label><input type="number" id="age" value="25" min="1" max="120"/></div>
    <div class="field"><label>Gender</label><select id="gender"><option value="m">Male</option><option value="f">Female</option></select></div>
  </div>
  <div class="row">
    <div class="field"><label>Weight (kg)</label><input type="number" id="wt" value="70" step="0.1"/></div>
    <div class="field"><label>Height (cm)</label><input type="number" id="ht" value="170"/></div>
  </div>
  <div class="field"><label>Activity Level</label>
    <select id="act">
      <option value="1.2">Sedentary (little/no exercise)</option>
      <option value="1.375">Light (1-3 days/week)</option>
      <option value="1.55" selected>Moderate (3-5 days/week)</option>
      <option value="1.725">Active (6-7 days/week)</option>
      <option value="1.9">Very active (hard daily exercise)</option>
    </select>
  </div>
  <button onclick="calculate()">Calculate</button>
  <div class="results" id="results">
    <div class="res-row"><span class="lbl">BMR (base calories)</span><span class="val" id="bmr"></span></div>
    <div class="res-row"><span class="lbl">Maintenance Calories</span><span class="val" id="tdee"></span></div>
    <div class="res-row"><span class="lbl">Weight Loss (−500/day)</span><span class="val" id="loss"></span></div>
    <div class="res-row"><span class="lbl">Weight Gain (+500/day)</span><span class="val" id="gain"></span></div>
  </div>
</div>
<script>
  function calculate(){
    const age=+document.getElementById('age').value,wt=+document.getElementById('wt').value,ht=+document.getElementById('ht').value,act=+document.getElementById('act').value,g=document.getElementById('gender').value;
    const bmr=g==='m'?10*wt+6.25*ht-5*age+5:10*wt+6.25*ht-5*age-161;
    const tdee=bmr*act;
    document.getElementById('bmr').textContent=Math.round(bmr)+' kcal';
    document.getElementById('tdee').textContent=Math.round(tdee)+' kcal';
    document.getElementById('loss').textContent=Math.round(tdee-500)+' kcal';
    document.getElementById('gain').textContent=Math.round(tdee+500)+' kcal';
    document.getElementById('results').style.display='block';
  }
</script>
</body>
</html>
