<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>UUID Generator</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif}
    body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f4f6f8;padding:20px}
    .card{background:#fff;width:100%;max-width:500px;padding:28px;border-radius:16px;box-shadow:0 12px 28px rgba(0,0,0,0.08)}
    h1{text-align:center;margin-bottom:20px;color:#333;font-size:1.5rem}
    .field{margin-bottom:14px}label{display:block;margin-bottom:6px;font-size:0.9rem;color:#555}
    input{width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:10px;font-size:1rem}
    .btns{display:flex;gap:10px;margin-bottom:16px}
    button{flex:1;padding:11px;background:#4c8bf5;color:#fff;border:none;border-radius:10px;font-size:1rem;cursor:pointer}
    button:hover{background:#3a73d9}
    .list{list-style:none;display:flex;flex-direction:column;gap:8px}
    .list li{display:flex;justify-content:space-between;align-items:center;background:#f1f3f5;border-radius:8px;padding:10px 14px;font-family:monospace;font-size:0.9rem;word-break:break-all}
    .copy-btn{background:#4c8bf5;color:#fff;border:none;border-radius:6px;padding:5px 10px;cursor:pointer;font-size:0.8rem;flex-shrink:0;margin-left:10px}
  </style>
</head>
<body>
<div class="card">
  <h1>UUID Generator</h1>
  <div class="field"><label>Count</label><input type="number" id="cnt" value="5" min="1" max="50"/></div>
  <div class="btns"><button onclick="gen()">Generate UUIDs</button><button onclick="clearList()" style="background:#e5e7eb;color:#333">Clear</button></div>
  <ul class="list" id="list"></ul>
</div>
<script>
  function uuid(){return([1e7]+-1e3+-4e3+-8e3+-1e11).replace(/[018]/g,c=>(c^crypto.getRandomValues(new Uint8Array(1))[0]&15>>c/4).toString(16));}
  function gen(){
    const n=Math.min(50,Math.max(1,+document.getElementById('cnt').value||1));
    const list=document.getElementById('list');
    list.innerHTML='';
    for(let i=0;i<n;i++){
      const id=uuid();
      list.innerHTML+=`<li><span>${id}</span><button class="copy-btn" onclick="navigator.clipboard.writeText('${id}')">Copy</button></li>`;
    }
  }
  function clearList(){document.getElementById('list').innerHTML='';}
  gen();
</script>
</body>
</html>
