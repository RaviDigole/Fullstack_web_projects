<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Email Writer</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#f1f5f9;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
width:700px;
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

h1{
text-align:center;
margin-bottom:20px;
color:#111827;
}

input, select{
width:100%;
padding:12px;
border-radius:8px;
border:1px solid #d1d5db;
margin-bottom:15px;
font-size:14px;
}

button{
width:100%;
padding:12px;
background:#2563eb;
border:none;
color:white;
font-size:16px;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

.output{
margin-top:20px;
background:#f3f4f6;
padding:20px;
border-radius:8px;
white-space:pre-line;
font-size:14px;
}

@media(max-width:750px){
.container{
width:90%;
}
}

</style>
</head>

<body>

<div class="container">

<h1>📧 AI Email Writer</h1>

<input id="purposeInput" type="text" placeholder="Enter email purpose (e.g., internship request)">

<select id="recipientType">
<option value="">Select recipient type</option>
<option value="professor">Professor</option>
<option value="hr">HR Manager</option>
<option value="team">Team Member</option>
<option value="client">Client</option>
</select>

<button onclick="generateEmail()">Generate Email</button>

<div id="emailOutput" class="output">
Generated email will appear here...
</div>

</div>

<script>

function generateEmail(){

const purpose = document.getElementById("purposeInput").value
const recipient = document.getElementById("recipientType").value
const output = document.getElementById("emailOutput")

if(purpose === "" || recipient === ""){
output.innerText = "Please enter email purpose and recipient type."
return
}

let email = ""

if(recipient === "professor"){

email = `Subject: Request Regarding ${purpose}

Dear Professor,

I hope you are doing well.

I am writing to request your guidance regarding ${purpose}. 
Your support and advice would be extremely valuable for me.

Please let me know if we can discuss this further.

Thank you for your time.

Best regards
[Your Name]`

}

else if(recipient === "hr"){

email = `Subject: Inquiry About ${purpose}

Dear Hiring Manager,

I hope this email finds you well.

I am reaching out to inquire about ${purpose}. 
I would appreciate the opportunity to discuss this further and learn more.

Thank you for your consideration.

Sincerely
[Your Name]`

}

else if(recipient === "team"){

email = `Subject: Update Regarding ${purpose}

Hello Team,

I hope everyone is doing well.

I wanted to share an update regarding ${purpose}. 
Please review the details and let me know your feedback.

Best regards
[Your Name]`

}

else if(recipient === "client"){

email = `Subject: Information About ${purpose}

Dear Client,

Thank you for reaching out.

I am writing to provide details regarding ${purpose}. 
Please feel free to contact me if you have any questions.

Looking forward to your response.

Best regards
[Your Name]`

}

output.innerText = email

}

</script>

</body>
</html>
