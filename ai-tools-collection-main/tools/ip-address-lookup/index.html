<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>IP Address Lookup</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif}
    body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f4f6f8;padding:20px}
    .card{background:#fff;width:100%;max-width:460px;padding:28px;border-radius:16px;box-shadow:0 12px 28px rgba(0,0,0,0.08)}
    h1{text-align:center;margin-bottom:20px;color:#333;font-size:1.5rem}
    .row{display:flex;gap:10px;margin-bottom:16px}
    input{flex:1;padding:11px;border:1px solid #ddd;border-radius:10px;font-size:1rem}
    button{padding:11px 18px;background:#4c8bf5;color:#fff;border:none;border-radius:10px;cursor:pointer;font-size:1rem}
    button:hover{background:#3a73d9}
    .info{background:#f1f3f5;border-radius:10px;padding:14px;display:none}
    .info-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #e5e7eb;font-size:0.95rem}
    .info-row:last-child{border:none}
    .lbl{color:#666}.val{font-weight:600;color:#333;text-align:right;max-width:200px;word-break:break-all}
    .err{color:#e74c3c;margin-top:10px;font-size:0.9rem;display:none}
    .loading{text-align:center;color:#4c8bf5;display:none;padding:10px}
  </style>
</head>
<body>
<div class="card">
  <h1>IP Address Lookup</h1>
  <div class="row">
    <input id="ip" placeholder="Enter IP address or leave blank for yours"/>
    <button onclick="lookup()">Lookup</button>
  </div>
  <div class="loading" id="loading">Looking up...</div>
  <div class="err" id="err"></div>
  <div class="info" id="info">
    <div class="info-row"><span class="lbl">IP</span><span class="val" id="f-ip"></span></div>
    <div class="info-row"><span class="lbl">City</span><span class="val" id="f-city"></span></div>
    <div class="info-row"><span class="lbl">Region</span><span class="val" id="f-region"></span></div>
    <div class="info-row"><span class="lbl">Country</span><span class="val" id="f-country"></span></div>
    <div class="info-row"><span class="lbl">Timezone</span><span class="val" id="f-tz"></span></div>
    <div class="info-row"><span class="lbl">ISP / Org</span><span class="val" id="f-org"></span></div>
  </div>
</div>
<script>
  async function lookup(){
    const ip=document.getElementById('ip').value.trim();
    const url=ip?`https://ipapi.co/${ip}/json/`:'https://ipapi.co/json/';
    document.getElementById('loading').style.display='block';
    document.getElementById('info').style.display='none';
    document.getElementById('err').style.display='none';
    try{
      const d=await(await fetch(url)).json();
      if(d.error){throw new Error(d.reason||'Not found');}
      document.getElementById('f-ip').textContent=d.ip;
      document.getElementById('f-city').textContent=d.city||'—';
      document.getElementById('f-region').textContent=d.region||'—';
      document.getElementById('f-country').textContent=`${d.country_name} (${d.country_code})`;
      document.getElementById('f-tz').textContent=d.timezone||'—';
      document.getElementById('f-org').textContent=d.org||'—';
      document.getElementById('info').style.display='block';
    }catch(e){document.getElementById('err').style.display='block';document.getElementById('err').textContent='Error: '+e.message;}
    finally{document.getElementById('loading').style.display='none';}
  }
</script>
</body>
</html>
