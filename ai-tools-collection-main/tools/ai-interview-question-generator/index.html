<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Interview Question Generator</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#f1f5f9;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
width:650px;
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
text-align:center;
}

h1{
margin-bottom:20px;
color:#111827;
}

input{
width:100%;
padding:12px;
border-radius:8px;
border:1px solid #d1d5db;
margin-bottom:15px;
font-size:14px;
}

button{
width:100%;
padding:12px;
background:#2563eb;
border:none;
color:white;
font-size:16px;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

.output{
margin-top:20px;
background:#f3f4f6;
padding:20px;
border-radius:8px;
text-align:left;
}

ul{
padding-left:18px;
}

@media(max-width:700px){
.container{
width:90%;
}
}

</style>
</head>

<body>

<div class="container">

<h1>🎤 AI Interview Question Generator</h1>

<input id="roleInput" type="text" placeholder="Enter job role (e.g., frontend developer)">

<button onclick="generateQuestions()">Generate Questions</button>

<div id="questionOutput" class="output">
<ul id="questionList"></ul>
</div>

</div>

<script>

function generateQuestions(){

const role = document.getElementById("roleInput").value.toLowerCase()
const list = document.getElementById("questionList")

list.innerHTML = ""

const questions = {

frontend:[
"Explain the difference between HTML, CSS, and JavaScript.",
"What is the box model in CSS?",
"What are Flexbox and Grid?",
"What is responsive design?",
"What is the difference between var, let, and const?"
],

backend:[
"What is REST API?",
"Explain MVC architecture.",
"What is database indexing?",
"What is authentication vs authorization?",
"What is middleware?"
],

data:[
"What is machine learning?",
"Explain supervised vs unsupervised learning.",
"What is overfitting in ML?",
"What are common Python libraries for data science?",
"What is feature engineering?"
],

general:[
"Tell me about yourself.",
"What are your strengths and weaknesses?",
"Why do you want to join our company?",
"Describe a challenging project you worked on.",
"Where do you see yourself in 5 years?"
]

}

let selected = []

if(role.includes("front")) selected = questions.frontend
else if(role.includes("back")) selected = questions.backend
else if(role.includes("data") || role.includes("ai")) selected = questions.data
else selected = questions.general

selected.forEach(q=>{
const li = document.createElement("li")
li.innerText = q
list.appendChild(li)
})

}

</script>

</body>
</html>
