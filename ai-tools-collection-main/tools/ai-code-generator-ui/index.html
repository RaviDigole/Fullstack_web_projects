<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Code Generator</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#f1f5f9;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
width:750px;
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

h1{
text-align:center;
margin-bottom:20px;
color:#111827;
}

.input-area{
display:flex;
gap:10px;
margin-bottom:20px;
}

.input-area input{
flex:1;
padding:12px;
border-radius:8px;
border:1px solid #d1d5db;
font-size:14px;
}

button{
padding:12px 20px;
background:#2563eb;
border:none;
color:white;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

.code-output{
background:#111827;
color:#e5e7eb;
padding:20px;
border-radius:8px;
font-family:monospace;
font-size:14px;
white-space:pre-wrap;
min-height:200px;
overflow:auto;
}

@media(max-width:800px){
.container{
width:90%;
}
}

</style>

</head>

<body>

<div class="container">

<h1>💻 AI Code Generator</h1>

<div class="input-area">
<input id="promptInput" type="text" placeholder="Example: create login form">
<button onclick="generateCode()">Generate</button>
</div>

<div id="codeOutput" class="code-output">
Generated code will appear here...
</div>

</div>

<script>

function generateCode(){

const prompt = document.getElementById("promptInput").value.toLowerCase()

let code = "Sorry, no template found for this prompt."

if(prompt.includes("login")){

code = `<form class="login-form">
  <h2>Login</h2>

  <input type="email" placeholder="Email" required>

  <input type="password" placeholder="Password" required>

  <button type="submit">Login</button>
</form>`
}

else if(prompt.includes("navbar")){

code = `<nav class="navbar">
  <h2>MyWebsite</h2>

  <ul>
    <li><a href="#">Home</a></li>
    <li><a href="#">About</a></li>
    <li><a href="#">Services</a></li>
    <li><a href="#">Contact</a></li>
  </ul>
</nav>`
}

else if(prompt.includes("card")){

code = `<div class="card">
  <img src="image.jpg" alt="Image">

  <h3>Card Title</h3>

  <p>This is a simple card layout example.</p>

  <button>Read More</button>
</div>`
}

document.getElementById("codeOutput").textContent = code

}

</script>

</body>
</html>
