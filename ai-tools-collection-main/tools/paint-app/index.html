<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Paint App</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif}
    body{min-height:100vh;display:flex;flex-direction:column;align-items:center;background:#f4f6f8;padding:16px}
    h1{margin-bottom:12px;color:#333;font-size:1.4rem}
    .toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;background:#fff;padding:12px 16px;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,0.08);margin-bottom:12px;width:100%;max-width:700px}
    .colors{display:flex;gap:6px;flex-wrap:wrap}
    .col{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform 0.1s}
    .col.active,.col:hover{transform:scale(1.2);border-color:#4c8bf5}
    label{font-size:0.85rem;color:#555}
    input[type=range]{width:80px}
    input[type=color]{width:32px;height:28px;border:none;border-radius:6px;cursor:pointer;padding:0}
    button{padding:8px 14px;background:#f1f3f5;color:#333;border:none;border-radius:8px;cursor:pointer;font-size:0.85rem}
    button:hover{background:#e2e8f0}
    button.active{background:#4c8bf5;color:#fff}
    canvas{background:#fff;border-radius:12px;box-shadow:0 4px 16px rgba(0,0,0,0.1);cursor:crosshair;touch-action:none;max-width:100%}
  </style>
</head>
<body>
  <h1>🎨 Paint App</h1>
  <div class="toolbar">
    <div class="colors" id="palette"></div>
    <input type="color" id="customColor" title="Custom color" onchange="setColor(this.value)"/>
    <label>Size <input type="range" id="size" min="1" max="60" value="8"/></label>
    <button id="brushBtn" class="active" onclick="setTool('brush')">Brush</button>
    <button id="eraserBtn" onclick="setTool('eraser')">Eraser</button>
    <button id="fillBtn" onclick="setTool('fill')">Fill</button>
    <button onclick="clearCanvas()">Clear</button>
    <button onclick="download()">Save</button>
  </div>
  <canvas id="canvas" width="680" height="420"></canvas>
<script>
  const canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d');
  let painting=false,tool='brush',color='#222',size=8;
  const colors=['#222222','#e74c3c','#e67e22','#f1c40f','#2ecc71','#3498db','#9b59b6','#ffffff','#ecf0f1','#bdc3c7','#1abc9c','#e91e63'];
  const pal=document.getElementById('palette');
  colors.forEach(c=>{const d=document.createElement('div');d.className='col';d.style.background=c;d.onclick=()=>{setColor(c);d.parentNode.querySelectorAll('.col').forEach(x=>x.classList.remove('active'));d.classList.add('active');};pal.appendChild(d);});
  pal.firstChild.classList.add('active');
  function setColor(c){color=c;if(tool==='eraser')setTool('brush');}
  function setTool(t){tool=t;document.querySelectorAll('.toolbar button').forEach(b=>b.classList.remove('active'));document.getElementById(t+'Btn').classList.add('active');}
  document.getElementById('size').oninput=e=>size=+e.target.value;
  function pos(e){const r=canvas.getBoundingClientRect(),sc=canvas.width/r.width;return{x:(((e.touches?e.touches[0].clientX:e.clientX)-r.left)*sc),y:(((e.touches?e.touches[0].clientY:e.clientY)-r.top)*sc)};}
  canvas.addEventListener('mousedown',e=>{if(tool==='fill'){floodFill(pos(e));return;}painting=true;const p=pos(e);ctx.beginPath();ctx.moveTo(p.x,p.y);draw(e);});
  canvas.addEventListener('mousemove',e=>{if(!painting)return;draw(e);});
  canvas.addEventListener('mouseup',()=>{painting=false;ctx.beginPath();});
  canvas.addEventListener('touchstart',e=>{e.preventDefault();if(tool==='fill'){floodFill(pos(e));return;}painting=true;draw(e);});
  canvas.addEventListener('touchmove',e=>{e.preventDefault();if(!painting)return;draw(e);});
  canvas.addEventListener('touchend',()=>{painting=false;});
  function draw(e){if(!painting)return;ctx.lineWidth=tool==='eraser'?size*2:size;ctx.lineCap='round';ctx.strokeStyle=tool==='eraser'?'#ffffff':color;const p=pos(e);ctx.lineTo(p.x,p.y);ctx.stroke();ctx.beginPath();ctx.moveTo(p.x,p.y);}
  function clearCanvas(){ctx.clearRect(0,0,canvas.width,canvas.height);}
  function download(){const a=document.createElement('a');a.download='drawing.png';a.href=canvas.toDataURL();a.click();}
  function floodFill(p){const img=ctx.getImageData(0,0,canvas.width,canvas.height),data=img.data,w=canvas.width;const ix=Math.round(p.x),iy=Math.round(p.y);const idx=(iy*w+ix)*4;const tr=data[idx],tg=data[idx+1],tb=data[idx+2],ta=data[idx+3];const fc=hexToRgb(color);if(tr===fc[0]&&tg===fc[1]&&tb===fc[2])return;const stack=[[ix,iy]];while(stack.length){const[x,y]=stack.pop();const i=(y*w+x)*4;if(x<0||x>=w||y<0||y>=canvas.height)continue;if(data[i]!==tr||data[i+1]!==tg||data[i+2]!==tb||data[i+3]!==ta)continue;data[i]=fc[0];data[i+1]=fc[1];data[i+2]=fc[2];data[i+3]=255;stack.push([x+1,y],[x-1,y],[x,y+1],[x,y-1]);}ctx.putImageData(img,0,0);}
  function hexToRgb(h){return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];}
</script>
</body>
</html>
