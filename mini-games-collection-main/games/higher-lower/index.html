<!DOCTYPE html>
<html>
<head>
<title>Higher or Lower Game</title>
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>
body{
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#f4f6fb;
}

.card{
background:white;
padding:30px;
border-radius:10px;
width:320px;
text-align:center;
box-shadow:0 10px 20px rgba(0,0,0,0.1);
}

button{
padding:10px 15px;
margin:5px;
border:none;
background:#4CAF50;
color:white;
border-radius:6px;
cursor:pointer;
}

.restart{
background:#333;
}

.number{
font-size:40px;
margin:20px 0;
}

.score{
margin-top:10px;
color:#555;
}
</style>
</head>

<body>

<div class="card">

<h2>Higher or Lower</h2>

<div class="number" id="currentNumber"></div>

<button onclick="guess('higher')">Higher</button>
<button onclick="guess('lower')">Lower</button>

<div id="result"></div>

<div class="score">Score: <span id="score">0</span></div>

<button class="restart" onclick="startGame()">Restart</button>

</div>

<script>

let current;
let next;
let score;

function startGame(){
score=0;
current=Math.floor(Math.random()*50)+1;
document.getElementById("score").textContent=score;
document.getElementById("currentNumber").textContent=current;
document.getElementById("result").textContent="";
}

function guess(type){

next=Math.floor(Math.random()*50)+1;

if((type==="higher" && next>current) || (type==="lower" && next<current)){
score++;
document.getElementById("result").textContent="Correct! Next number was "+next;
}else{
score=0;
document.getElementById("result").textContent="Wrong! Next number was "+next;
}

current=next;

document.getElementById("currentNumber").textContent=current;
document.getElementById("score").textContent=score;

}

startGame();

</script>

</body>
</html>
