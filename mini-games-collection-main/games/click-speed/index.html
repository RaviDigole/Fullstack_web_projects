<!DOCTYPE html>
<html>
<head>
<title>Click Speed Test</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
body{font-family:Arial;display:flex;justify-content:center;align-items:center;height:100vh;background:#eef2ff}
.card{background:white;padding:30px;border-radius:10px;width:320px;text-align:center;box-shadow:0 10px 20px rgba(0,0,0,0.1)}
.area{height:120px;background:#6366f1;color:white;display:flex;align-items:center;justify-content:center;border-radius:8px;cursor:pointer;margin:20px 0}
button{padding:10px 15px;background:#333;color:white;border:none;border-radius:6px}
</style>
</head>

<body>

<div class="card">

<h2>Click Speed Test</h2>

<div class="area" onclick="clickBox()">CLICK</div>

<div>Score: <span id="score">0</span></div>

<button onclick="restart()">Restart</button>

</div>

<script>

let score=0;
let running=false;

function clickBox(){

if(!running){

running=true;

setTimeout(()=>{
running=false;
alert("Time up! Score: "+score);
},5000);

}

if(running){

score++;
document.getElementById("score").textContent=score;

}

}

function restart(){

score=0;
running=false;
document.getElementById("score").textContent=0;

}

</script>

</body>
</html>
