<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Generator</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{height:100vh;display:flex;justify-content:center;align-items:center;background:linear-gradient(135deg,#373b44,#4286f4);}
.card{background:white;padding:30px;border-radius:12px;width:90%;max-width:400px;text-align:center;box-shadow:0 10px 25px rgba(0,0,0,0.2);}
h1{margin-bottom:20px;color:#333;}
.output{background:#f4f4f4;padding:14px;border-radius:8px;font-size:18px;font-family:monospace;margin-bottom:15px;word-break:break-all;min-height:50px;color:#333;}
.controls{text-align:left;margin-bottom:15px;}
.controls label{display:block;margin-bottom:8px;font-size:14px;color:#555;}
.controls input[type=range]{width:100%;}
.checkboxes{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:15px;}
.checkboxes label{font-size:14px;color:#555;display:flex;align-items:center;gap:6px;}
.strength{height:8px;border-radius:4px;margin-bottom:12px;transition:0.3s;}
button{padding:10px 20px;margin:4px;border:none;border-radius:8px;font-size:15px;cursor:pointer;transition:0.2s;}
#genBtn{background:#4286f4;color:white;}#genBtn:hover{background:#3070d0;}
#copyBtn{background:#28a745;color:white;}#copyBtn:hover{background:#1e8035;}
.msg{font-size:13px;color:#28a745;margin-top:6px;}
</style>
</head>
<body>
<div class="card">
<h1>🔐 Password Generator</h1>
<div class="output" id="output">Click Generate!</div>
<div class="strength" id="strength"></div>
<div class="controls">
<label>Length: <strong id="lenVal">16</strong>
<input type="range" id="lenRange" min="6" max="40" value="16">
</label>
</div>
<div class="checkboxes">
<label><input type="checkbox" id="upper" checked> Uppercase</label>
<label><input type="checkbox" id="lower" checked> Lowercase</label>
<label><input type="checkbox" id="nums" checked> Numbers</label>
<label><input type="checkbox" id="syms"> Symbols</label>
</div>
<button id="genBtn">Generate</button>
<button id="copyBtn">Copy</button>
<div class="msg" id="msg"></div>
</div>
<script>
const U="ABCDEFGHIJKLMNOPQRSTUVWXYZ",L="abcdefghijklmnopqrstuvwxyz",N="0123456789",S="!@#$%^&*()_+-=[]{}";
document.getElementById("lenRange").addEventListener("input",()=>{
document.getElementById("lenVal").textContent=document.getElementById("lenRange").value;});
function gen(){
let chars="";
if(document.getElementById("upper").checked)chars+=U;
if(document.getElementById("lower").checked)chars+=L;
if(document.getElementById("nums").checked)chars+=N;
if(document.getElementById("syms").checked)chars+=S;
if(!chars){document.getElementById("output").textContent="Select at least one option!";return;}
const len=+document.getElementById("lenRange").value;
let pw="";
for(let i=0;i<len;i++)pw+=chars[Math.floor(Math.random()*chars.length)];
document.getElementById("output").textContent=pw;
// strength
const opts=[document.getElementById("upper").checked,document.getElementById("lower").checked,document.getElementById("nums").checked,document.getElementById("syms").checked].filter(Boolean).length;
const colors=["#dc3545","#fd7e14","#ffc107","#28a745"];
const s=document.getElementById("strength");
const str=Math.min(opts-1,3);
s.style.background=colors[str];s.style.width=(opts/4*100)+"%";
}
document.getElementById("genBtn").addEventListener("click",gen);
document.getElementById("copyBtn").addEventListener("click",()=>{
const txt=document.getElementById("output").textContent;
navigator.clipboard.writeText(txt);
document.getElementById("msg").textContent="Copied to clipboard! ✅";
setTimeout(()=>document.getElementById("msg").textContent="",2000);
});
gen();
</script>
</body>
</html>
