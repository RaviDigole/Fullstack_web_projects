<!DOCTYPE html>
<html>
<head>
<title>Hangman</title>
<style>
body{font-family:Arial;text-align:center}
button{margin:3px;padding:8px}
</style>
</head>

<body>

<h2>Hangman</h2>

<div id="word"></div>

<div id="letters"></div>

<div>Attempts: <span id="tries">6</span></div>

<button onclick="location.reload()">Restart</button>

<script>

let word="javascript"
let display=Array(word.length).fill("_")
let tries=6

document.getElementById("word").textContent=display.join(" ")

let letters="abcdefghijklmnopqrstuvwxyz"

letters.split("").forEach(l=>{

let btn=document.createElement("button")
btn.textContent=l

btn.onclick=function(){

btn.disabled=true

if(word.includes(l)){

word.split("").forEach((c,i)=>{
if(c===l) display[i]=l
})

}else{

tries--
document.getElementById("tries").textContent=tries

}

document.getElementById("word").textContent=display.join(" ")

}

document.getElementById("letters").appendChild(btn)

})

</script>
</body>
</html>
