<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dodge Ball</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{height:100vh;display:flex;justify-content:center;align-items:center;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);}
.card{background:#1a1a2e;padding:20px;border-radius:12px;text-align:center;box-shadow:0 10px 30px rgba(0,0,0,0.5);}
h1{color:white;margin-bottom:8px;}
.meta{color:#aaa;font-size:15px;margin-bottom:12px;}<br>.meta span{color:#ffd700;}
canvas{border:2px solid #444;border-radius:8px;display:block;cursor:none;}
button{padding:10px 25px;margin-top:12px;border:none;border-radius:8px;font-size:15px;cursor:pointer;background:#7c3aed;color:white;transition:0.2s;}
button:hover{background:#6d28d9;}
.msg{color:white;font-size:15px;margin-top:8px;min-height:22px;}
</style>
</head>
<body>
<div class="card">
<h1>🎯 Dodge Ball</h1>
<div class="meta">Score: <span id="score">0</span> | Best: <span id="best">0</span></div>
<canvas id="canvas" width="320" height="320"></canvas>
<button id="startBtn">Start</button>
<div class="msg" id="msg">Move mouse to dodge!</div>
</div>
<script>
const canvas=document.getElementById("canvas");const ctx=canvas.getContext("2d");
let player={x:160,y:280,r:12};let balls=[],score=0,best=0,running=false,animId,scoreTimer;
canvas.addEventListener("mousemove",e=>{
const rect=canvas.getBoundingClientRect();
player.x=e.clientX-rect.left;player.y=e.clientY-rect.top;
});
function spawnBall(){
balls.push({x:Math.random()*300+10,y:-15,r:10,vx:(Math.random()-0.5)*4,vy:2+score/100});
}
function draw(){
ctx.clearRect(0,0,320,320);
ctx.fillStyle="#0d0d1a";ctx.fillRect(0,0,320,320);
// player
ctx.beginPath();ctx.arc(player.x,player.y,player.r,0,Math.PI*2);
ctx.fillStyle="#ffd700";ctx.fill();
// balls
balls.forEach(b=>{
ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
ctx.fillStyle="#e74c3c";ctx.fill();
});
}
function update(){
balls.forEach(b=>{b.x+=b.vx;b.y+=b.vy;if(b.x<10||b.x>310)b.vx*=-1;});
balls=balls.filter(b=>b.y<340);
if(Math.random()<0.02+score/5000)spawnBall();
// collision
for(const b of balls){
const dx=b.x-player.x,dy=b.y-player.y;
if(Math.sqrt(dx*dx+dy*dy)<b.r+player.r){endGame();return;}
}
draw();animId=requestAnimationFrame(update);
}
function endGame(){
cancelAnimationFrame(animId);clearInterval(scoreTimer);running=false;
if(score>best){best=score;document.getElementById("best").textContent=best;}
document.getElementById("msg").textContent=`Hit! Score: ${score} 💥`;
document.getElementById("startBtn").style.display="inline-block";
ctx.fillStyle="rgba(0,0,0,0.6)";ctx.fillRect(0,0,320,320);
ctx.fillStyle="white";ctx.font="24px Arial";ctx.textAlign="center";ctx.fillText("Game Over",160,150);
}
document.getElementById("startBtn").addEventListener("click",()=>{
balls=[];score=0;player={x:160,y:280,r:12};
document.getElementById("score").textContent=0;
document.getElementById("msg").textContent="";
document.getElementById("startBtn").style.display="none";
running=true;
scoreTimer=setInterval(()=>{score++;document.getElementById("score").textContent=score;},100);
update();
});
draw();
</script>
</body>
</html>
