<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spin the Bottle</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{height:100vh;display:flex;justify-content:center;align-items:center;background:linear-gradient(135deg,#ff6b6b,#feca57);}
.card{background:white;padding:30px;border-radius:12px;width:90%;max-width:420px;text-align:center;box-shadow:0 10px 25px rgba(0,0,0,0.2);}
h1{margin-bottom:15px;color:#333;}
.players{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:15px;min-height:40px;}
.player-tag{background:#ff6b6b;color:white;padding:5px 12px;border-radius:20px;font-size:14px;cursor:pointer;}
.player-tag:hover{background:#e55c5c;}
.add-player{display:flex;gap:8px;margin-bottom:15px;}
.add-player input{flex:1;padding:9px;border:1px solid #ccc;border-radius:8px;font-size:14px;outline:none;}
.add-player button{padding:9px 16px;border:none;border-radius:8px;background:#ff6b6b;color:white;cursor:pointer;font-size:14px;}
.wheel-wrap{position:relative;width:220px;height:220px;margin:0 auto 15px;}
canvas{display:block;}
.arrow{position:absolute;top:-10px;left:50%;transform:translateX(-50%);font-size:28px;}
button#spinBtn{padding:12px 30px;border:none;border-radius:8px;font-size:16px;cursor:pointer;background:#feca57;color:#333;font-weight:bold;transition:0.2s;}
button#spinBtn:hover{background:#e5b43e;}
.result{margin-top:12px;font-size:18px;font-weight:bold;color:#ff6b6b;min-height:24px;}
</style>
</head>
<body>
<div class="card">
<h1>🍾 Spin the Bottle</h1>
<div class="add-player">
<input type="text" id="nameIn" placeholder="Add player name...">
<button onclick="addPlayer()">Add</button>
</div>
<div class="players" id="players"></div>
<div class="wheel-wrap">
<div class="arrow">⬇️</div>
<canvas id="wheel" width="220" height="220"></canvas>
</div>
<button id="spinBtn">Spin!</button>
<div class="result" id="result"></div>
</div>
<script>
let players=["Alice","Bob","Charlie","Diana"],spinning=false,angle=0;
const colors=["#ff6b6b","#feca57","#48dbfb","#ff9ff3","#54a0ff","#5f27cd","#00d2d3","#2ecc71"];
const canvas=document.getElementById("wheel");const ctx=canvas.getContext("2d");
function renderPlayers(){
document.getElementById("players").innerHTML="";
players.forEach((p,i)=>{
const t=document.createElement("div");t.className="player-tag";t.textContent=`${p} ✕`;
t.onclick=()=>{players.splice(i,1);renderPlayers();drawWheel(angle);};
document.getElementById("players").appendChild(t);
});
}
function addPlayer(){
const n=document.getElementById("nameIn").value.trim();
if(!n||players.includes(n))return;
players.push(n);document.getElementById("nameIn").value="";
renderPlayers();drawWheel(angle);
}
function drawWheel(a){
ctx.clearRect(0,0,220,220);
const n=players.length;if(!n)return;
const slice=2*Math.PI/n,cx=110,cy=110,r=105;
players.forEach((p,i)=>{
const start=a+i*slice,end=start+slice;
ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,start,end);
ctx.fillStyle=colors[i%colors.length];ctx.fill();
ctx.strokeStyle="white";ctx.lineWidth=2;ctx.stroke();
ctx.save();ctx.translate(cx,cy);ctx.rotate(start+slice/2);
ctx.textAlign="right";ctx.fillStyle="white";ctx.font=`bold ${Math.min(14,80/n)}px Arial`;
ctx.fillText(p.substring(0,8),r-8,5);ctx.restore();
});
ctx.beginPath();ctx.arc(cx,cy,12,0,2*Math.PI);ctx.fillStyle="#333";ctx.fill();
}
function spin(){
if(spinning||players.length<2){document.getElementById("result").textContent=players.length<2?"Add at least 2 players!":"";return;}
spinning=true;document.getElementById("result").textContent="";
const extra=Math.PI*2*5+Math.random()*Math.PI*2;
const dur=3000;const start=performance.now();const startAngle=angle;
function anim(t){
const el=Math.min((t-start)/dur,1);
const ease=1-Math.pow(1-el,3);
angle=startAngle+extra*ease;
drawWheel(angle);
if(el<1){requestAnimationFrame(anim);}
else{
spinning=false;
const norm=((angle%(2*Math.PI))+2*Math.PI)%(2*Math.PI);
const slice=2*Math.PI/players.length;
const picked=players[Math.floor(((2*Math.PI-norm%(2*Math.PI))/(2*Math.PI))*players.length)%players.length];
document.getElementById("result").textContent=`🎉 ${picked}!`;
}
}
requestAnimationFrame(anim);
}
document.getElementById("spinBtn").addEventListener("click",spin);
document.getElementById("nameIn").addEventListener("keydown",e=>{if(e.key==="Enter")addPlayer();});
renderPlayers();drawWheel(angle);
</script>
</body>
</html>
