<!DOCTYPE html>
<html>
<head>
<title>Reaction Time Tester</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
body{font-family:Arial;display:flex;justify-content:center;align-items:center;height:100vh;background:#f4f4f4}
.card{background:white;padding:30px;border-radius:10px;text-align:center;width:320px;box-shadow:0 10px 20px rgba(0,0,0,0.1)}
.box{height:120px;background:red;margin:20px 0;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:white}
button{padding:10px 15px;border:none;background:#333;color:white;border-radius:6px}
</style>
</head>

<body>

<div class="card">

<h2>Reaction Time Tester</h2>

<div class="box" id="box">Wait...</div>

<div>Time: <span id="score">0</span> ms</div>

<button onclick="start()">Restart</button>

</div>

<script>

let startTime;

function start(){

let box=document.getElementById("box");
box.style.background="red";
box.textContent="Wait...";

setTimeout(()=>{

box.style.background="green";
box.textContent="CLICK!";

startTime=Date.now();

},Math.random()*3000+1000);

}

document.getElementById("box").onclick=function(){

if(this.style.background==="green"){

let reaction=Date.now()-startTime;

document.getElementById("score").textContent=reaction;

this.textContent="Restart";

}

}

start();

</script>

</body>
</html>
