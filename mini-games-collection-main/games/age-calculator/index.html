<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Age Calculator</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{height:100vh;display:flex;justify-content:center;align-items:center;background:linear-gradient(135deg,#a18cd1,#fbc2eb);}
.card{background:white;padding:35px;border-radius:12px;width:90%;max-width:380px;text-align:center;box-shadow:0 10px 25px rgba(0,0,0,0.2);}
h1{margin-bottom:20px;color:#333;}
label{display:block;text-align:left;font-size:14px;color:#555;margin-bottom:6px;}
input[type=date]{width:100%;padding:12px;font-size:15px;border:1px solid #ccc;border-radius:8px;outline:none;margin-bottom:15px;}
button{padding:12px 25px;border:none;border-radius:8px;font-size:16px;cursor:pointer;background:#a18cd1;color:white;transition:0.2s;width:100%;}
button:hover{background:#8a73b8;}
.result{margin-top:20px;padding:15px;background:#f4f0ff;border-radius:10px;text-align:left;}
.result .big{font-size:28px;font-weight:bold;color:#a18cd1;text-align:center;margin-bottom:8px;}
.result p{font-size:14px;color:#555;margin:4px 0;}
</style>
</head>
<body>
<div class="card">
<h1>🎂 Age Calculator</h1>
<label>Enter your Date of Birth:</label>
<input type="date" id="dob">
<button id="calcBtn">Calculate Age</button>
<div class="result" id="result" style="display:none">
<div class="big" id="ageBig"></div>
<p id="months"></p>
<p id="days"></p>
<p id="hours"></p>
<p id="nextBday"></p>
</div>
</div>
<script>
document.getElementById("calcBtn").addEventListener("click",()=>{
const dob=new Date(document.getElementById("dob").value);
if(!document.getElementById("dob").value){alert("Please select a date!");return;}
const now=new Date();
if(dob>now){alert("Date cannot be in the future!");return;}
let y=now.getFullYear()-dob.getFullYear();
let m=now.getMonth()-dob.getMonth();
let d=now.getDate()-dob.getDate();
if(d<0){m--;d+=new Date(now.getFullYear(),now.getMonth(),0).getDate();}
if(m<0){y--;m+=12;}
const totalMonths=y*12+m;
const totalDays=Math.floor((now-dob)/(1000*60*60*24));
const totalHours=totalDays*24;
const next=new Date(dob);next.setFullYear(now.getFullYear());
if(next<now)next.setFullYear(now.getFullYear()+1);
const daysLeft=Math.ceil((next-now)/(1000*60*60*24));
document.getElementById("ageBig").textContent=`${y} Years, ${m} Months, ${d} Days`;
document.getElementById("months").textContent=`📅 Total Months: ${totalMonths.toLocaleString()}`;
document.getElementById("days").textContent=`📆 Total Days: ${totalDays.toLocaleString()}`;
document.getElementById("hours").textContent=`⏰ Total Hours: ${totalHours.toLocaleString()}`;
document.getElementById("nextBday").textContent=`🎉 Next Birthday: ${daysLeft} day${daysLeft===1?"":"s"} away`;
document.getElementById("result").style.display="block";
});
</script>
</body>
</html>
