<!DOCTYPE html>
<html>
<head>
<title>Balloon Pop Game</title>
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>
body{font-family:Arial;text-align:center;background:#eef2ff}
.balloon{width:50px;height:70px;background:red;border-radius:50%;position:absolute;cursor:pointer}
</style>

</head>
<body>

<h2>Balloon Pop</h2>

<div>Score: <span id="score">0</span></div>

<button onclick="restart()">Restart</button>

<script>

let score=0

function createBalloon(){

let balloon=document.createElement("div")
balloon.className="balloon"

let x=Math.random()*(window.innerWidth-60)
balloon.style.left=x+"px"
balloon.style.bottom="0px"

document.body.appendChild(balloon)

let pos=0

let interval=setInterval(()=>{

pos+=2
balloon.style.bottom=pos+"px"

if(pos>window.innerHeight){
balloon.remove()
clearInterval(interval)
}

},20)

balloon.onclick=function(){

score++
document.getElementById("score").textContent=score
balloon.remove()

}

}

setInterval(createBalloon,1200)

function restart(){

score=0
document.getElementById("score").textContent=0

}

</script>
</body>
</html>
